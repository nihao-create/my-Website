<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>黑胶唱片·灵韵播放器 | 动态播放列表 + NFC完整链接</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      user-select: none;
    }

    body {
      min-height: 100vh;
      background: radial-gradient(circle at 20% 30%, #1a1e2a, #0c0f17);
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: 'Segoe UI', 'Poppins', system-ui, -apple-system, 'Inter', sans-serif;
      padding: 1.5rem;
    }

    .player-container {
      max-width: 560px;
      width: 100%;
      background: rgba(20, 22, 36, 0.75);
      backdrop-filter: blur(16px);
      border-radius: 3rem;
      box-shadow: 0 25px 45px rgba(0, 0, 0, 0.5), inset 0 1px 0 rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.2);
      padding: 1.8rem 1.5rem 2rem;
      transition: all 0.3s ease;
    }

    .vinyl-section {
      display: flex;
      justify-content: center;
      margin-bottom: 1.5rem;
      position: relative;
    }

    .record-wrapper {
      position: relative;
      width: 220px;
      height: 220px;
      border-radius: 50%;
      background: #111;
      box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5), 0 0 0 6px rgba(255, 255, 255, 0.08), inset 0 1px 4px rgba(0, 0, 0, 0.6);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .record-wrapper::before {
      content: "";
      position: absolute;
      top: 8px;
      left: 8px;
      right: 8px;
      bottom: 8px;
      border-radius: 50%;
      background: repeating-radial-gradient(circle at 30% 30%, rgba(0, 0, 0, 0.2) 0px, rgba(0, 0, 0, 0.4) 2px, rgba(80, 70, 60, 0.1) 4px, rgba(0, 0, 0, 0.3) 6px);
      pointer-events: none;
      z-index: 2;
      mix-blend-mode: multiply;
    }

    .spinning {
      animation: spinRecord 8s linear infinite;
    }

    @keyframes spinRecord {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    .cover-frame {
      width: 160px;
      height: 160px;
      border-radius: 50%;
      overflow: hidden;
      background: #2a2a2a;
      box-shadow: inset 0 0 0 3px rgba(255, 215, 150, 0.5), 0 5px 12px black;
      z-index: 5;
    }

    .cover-frame img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .tonearm {
      position: absolute;
      top: -20px;
      right: -15px;
      width: 70px;
      height: 95px;
      background: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 120"><path fill="%23c0aa7a" d="M58,10 L70,25 L62,32 L50,18 Z" /><path fill="%23927b54" d="M68,25 L75,38 L68,44 L58,32 Z" /><circle cx="71" cy="45" r="6" fill="%234d3b1a"/><path fill="%23b39264" d="M72,48 L88,70 L82,76 L65,54 Z"/><circle cx="84" cy="74" r="4" fill="%236b4c2c"/></svg>') no-repeat center/contain;
      z-index: 10;
      filter: drop-shadow(2px 4px 6px rgba(0, 0, 0, 0.4));
      transform-origin: 20% 20%;
      transition: transform 0.35s cubic-bezier(0.2, 0.9, 0.4, 1.1);
    }

    .progress-area {
      margin: 20px 0 18px;
    }

    .time-info {
      display: flex;
      justify-content: space-between;
      font-size: 0.75rem;
      color: #ddd8ce;
      margin-bottom: 8px;
      font-weight: 500;
    }

    input[type="range"] {
      -webkit-appearance: none;
      width: 100%;
      background: transparent;
    }

    input[type="range"]::-webkit-slider-runnable-track {
      width: 100%;
      height: 5px;
      background: rgba(255, 255, 255, 0.2);
      border-radius: 10px;
    }

    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 16px;
      height: 16px;
      background: #f5c542;
      border-radius: 50%;
      margin-top: -5px;
      cursor: pointer;
      box-shadow: 0 0 6px #ffcf4a;
      border: 1px solid #ffe6b3;
    }

    .playback-buttons {
      display: flex;
      justify-content: center;
      gap: 2rem;
      margin: 20px 0 15px;
    }

    .ctrl-btn {
      background: rgba(20, 22, 40, 0.8);
      backdrop-filter: blur(4px);
      width: 56px;
      height: 56px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.8rem;
      color: #f0e6d2;
      cursor: pointer;
      transition: all 0.2s;
      box-shadow: 0 6px 12px rgba(0, 0, 0, 0.3);
      border: 1px solid rgba(255, 215, 150, 0.4);
    }

    .ctrl-btn:active {
      transform: scale(0.94);
    }

    .custom-panel,
    .playlist-section {
      background: rgba(10, 12, 22, 0.6);
      border-radius: 2rem;
      padding: 1rem 1.2rem;
      margin-top: 1.2rem;
      backdrop-filter: blur(8px);
      border: 1px solid rgba(255, 215, 150, 0.25);
    }

    .section-title {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 2px;
      font-weight: 600;
      color: #cdc2a8;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .playlist-container {
      max-height: 220px;
      overflow-y: auto;
      padding-right: 5px;
    }

    .playlist-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: rgba(30, 32, 48, 0.7);
      margin-bottom: 8px;
      padding: 10px 12px;
      border-radius: 40px;
      cursor: pointer;
      transition: all 0.2s;
      border: 1px solid rgba(255, 215, 150, 0.2);
    }

    .playlist-item:hover {
      background: rgba(60, 63, 90, 0.9);
      border-color: #f5c542;
      transform: translateX(3px);
    }

    .playlist-item.active-song {
      background: linear-gradient(90deg, #2d2f42, #232536);
      border-left: 4px solid #f5c542;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
    }

    .song-info {
      flex: 1;
      overflow: hidden;
    }

    .song-name {
      font-size: 0.85rem;
      font-weight: 600;
      color: #f2e8d5;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .song-meta {
      font-size: 0.65rem;
      color: #b9ae8c;
    }

    .now-playing-tag {
      font-size: 0.6rem;
      background: #f5c54230;
      padding: 2px 8px;
      border-radius: 40px;
      color: #f5c542;
      margin-left: 8px;
      white-space: nowrap;
    }

    .playlist-actions {
      display: flex;
      gap: 6px;
      align-items: center;
    }

    .del-song-btn {
      background: none;
      border: none;
      color: #bb9a6e;
      font-size: 0.9rem;
      cursor: pointer;
      padding: 4px;
      border-radius: 30px;
      transition: 0.2s;
    }

    .del-song-btn:hover {
      color: #ffaa66;
      transform: scale(1.1);
    }

    .input-group {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 18px;
      align-items: center;
    }

    .input-group input,
    .input-group .file-label {
      flex: 1;
      background: #2c2f3e;
      border: none;
      padding: 10px 14px;
      border-radius: 50px;
      color: #f0e6cf;
      font-size: 0.8rem;
      outline: none;
      border: 1px solid #4a4e6b;
    }

    .input-group input:focus {
      border-color: #f5c542;
    }

    .file-label {
      background: #3d3f55;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      cursor: pointer;
    }

    input[type="file"] {
      display: none;
    }

    .small-btn {
      background: #f5c542;
      border: none;
      padding: 8px 18px;
      border-radius: 40px;
      font-weight: bold;
      color: #1e1f2c;
      cursor: pointer;
      font-size: 0.75rem;
      transition: 0.2s;
    }

    .small-btn:hover {
      background: #ffdf8c;
      transform: scale(0.97);
    }

    .nfc-section {
      margin-top: 15px;
      background: #00000040;
      border-radius: 1.5rem;
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .nfc-header {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.75rem;
      color: #f5c542;
    }

    .nfc-link-box {
      background: #12141f;
      padding: 10px 12px;
      border-radius: 20px;
      font-size: 0.7rem;
      font-family: monospace;
      word-break: break-all;
      color: #c7bc9a;
      border: 1px solid #2a2e4a;
      max-height: 80px;
      overflow-y: auto;
    }

    .copy-btn {
      background: #2a2e4a;
      border: none;
      color: #ffdfaa;
      padding: 8px 14px;
      border-radius: 40px;
      font-size: 0.75rem;
      cursor: pointer;
      width: 100%;
      transition: 0.2s;
    }

    .copy-btn:hover {
      background: #3d4070;
    }

    .volume-slider {
      width: 100%;
      margin-top: 10px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .volume-slider i {
      color: #decb9c;
    }

    .alert-toast {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: #f5c542dd;
      color: #1e1f2a;
      padding: 6px 18px;
      border-radius: 60px;
      font-size: 0.75rem;
      font-weight: bold;
      backdrop-filter: blur(12px);
      z-index: 999;
      transition: 0.2s;
      pointer-events: none;
    }

    .guide-text {
      background: #00000030;
      border-radius: 1rem;
      padding: 0.7rem;
      margin-top: 0.8rem;
      font-size: 0.65rem;
      color: #ccc2aa;
      line-height: 1.4;
    }

    @media (max-width: 480px) {
      .player-container {
        padding: 1.2rem;
      }

      .record-wrapper {
        width: 180px;
        height: 180px;
      }

      .cover-frame {
        width: 130px;
        height: 130px;
      }

      .ctrl-btn {
        width: 48px;
        height: 48px;
        font-size: 1.4rem;
      }

      .playlist-container {
        max-height: 180px;
      }

      .song-name {
        font-size: 0.75rem;
      }
    }
  </style>
</head>
<body>
<div class="player-container">
  <!-- 黑胶区 -->
  <div class="vinyl-section">
    <div class="record-wrapper" id="recordDisc">
      <div class="cover-frame">
        <img id="coverImage" src="https://placehold.co/400/2c2e3f/c9b982?text=🎵+COVER" alt="album cover">
      </div>
    </div>
    <div class="tonearm"></div>
  </div>

  <!-- 进度/音量 -->
  <div class="progress-area">
    <div class="time-info"><span id="currentTime">0:00</span><span id="durationTime">0:00</span></div>
    <input type="range" id="progressSlider" value="0" step="0.01">
    <div class="volume-slider"><i class="fas fa-volume-down"></i><input type="range" id="volumeControl" min="0" max="1" step="0.01" value="0.7"><i class="fas fa-volume-up"></i></div>
  </div>

  <!-- 播放按钮 -->
  <div class="playback-buttons">
    <div class="ctrl-btn" id="playPauseBtn"><i class="fas fa-play"></i></div>
  </div>

  <!-- 播放列表 -->
  <div class="playlist-section">
    <div class="section-title">
      <span><i class="fas fa-list-ul"></i> 播放列表 · 点击切换</span>
      <div><button id="clearPlaylistBtn" class="small-btn" style="background:#4a4e6b; color:white; padding:4px 12px;">清空</button><span id="playlistCount" style="margin-left:8px;">0首</span></div>
    </div>
    <div class="playlist-container" id="playlistContainer">
      <div style="text-align:center; color:#b9ae8c; padding:10px;">✨ 添加歌曲开始欣赏</div>
    </div>
  </div>

  <!-- 自定义面板：封面/音频 -->
  <div class="custom-panel">
    <div class="section-title"><i class="fas fa-image"></i> 唱片封面自定义</div>
    <div class="input-group">
      <input type="text" id="coverUrlInput" placeholder="图片网络地址 (https://...)" value="">
      <label class="file-label" for="coverUpload"><i class="fas fa-upload"></i> 本地上传</label>
      <input type="file" id="coverUpload" accept="image/jpeg,image/png,image/webp">
      <button class="small-btn" id="applyCoverBtn">应用</button>
    </div>

    <div class="section-title"><i class="fas fa-music"></i> 音频源 & 播放列表管理</div>
    <div class="input-group">
      <input type="text" id="audioUrlInput" placeholder="网络音频地址 (https://...)" value="">
      <label class="file-label" for="audioUpload"><i class="fas fa-file-audio"></i> 上传本地音乐</label>
      <input type="file" id="audioUpload" accept="audio/mpeg,audio/mp3,audio/wav,audio/ogg,audio/m4a">
      <button class="small-btn" id="addNetToPlaylistBtn">添加到列表</button>
    </div>
    <div class="input-group">
      <button class="small-btn" id="resetDefaultBtn" style="background:#4a4e6b; color:white;">恢复示例列表</button>
      <button class="small-btn" id="applyAudioBtn">加载当前音源</button>
    </div>

    <!-- 引导教程 -->
    <div class="guide-text">
      <i class="fas fa-question-circle" style="color:#f5c542;"></i> <strong>如何让本地音乐变成网络链接？</strong><br>
      ① 将音乐上传至 GitHub 公开仓库 或 Cloudflare R2 <br>
      ② 获取直链 (https://开头) → 复制到上方“网络音频地址”框 → 点“添加到列表”<br>
      ③ 此时自动生成完整NFC链接，点击下方按钮复制后写入NFC标签。
    </div>
  </div>

  <!-- NFC 写入模块（修复：完整显示+可靠复制） -->
  <div class="nfc-section">
    <div class="nfc-header"><i class="fas fa-microchip"></i> 🔗 NFC写入链接（基于当前网络音源）</div>
    <div class="nfc-link-box" id="nfcLinkDisplay">⚠️ 未配置网络音频</div>
    <button class="copy-btn" id="copyNfcLinkBtn"><i class="far fa-copy"></i> 复制完整链接（用于NFC工具）</button>
  </div>
  <p style="font-size:0.55rem; text-align:center; margin-top:8px; color:#b9ae8c;">💡 本地音乐仅当前设备有效，网络链接可写入NFC且任何访客可播。</p>
</div>

<script>
  // ---------- DOM ----------
  const audioElement = new Audio();
  let isPlaying = false;
  const playPauseBtn = document.getElementById('playPauseBtn');
  const playIcon = playPauseBtn.querySelector('i');
  const progressSlider = document.getElementById('progressSlider');
  const currentTimeSpan = document.getElementById('currentTime');
  const durationSpan = document.getElementById('durationTime');
  const volumeSlider = document.getElementById('volumeControl');
  const coverImage = document.getElementById('coverImage');
  const recordDisc = document.getElementById('recordDisc');
  const coverUrlInput = document.getElementById('coverUrlInput');
  const coverUpload = document.getElementById('coverUpload');
  const applyCoverBtn = document.getElementById('applyCoverBtn');
  const audioUrlInput = document.getElementById('audioUrlInput');
  const audioUpload = document.getElementById('audioUpload');
  const applyAudioBtn = document.getElementById('applyAudioBtn');
  const resetDefaultBtn = document.getElementById('resetDefaultBtn');
  const nfcLinkDisplay = document.getElementById('nfcLinkDisplay');
  const copyNfcLinkBtn = document.getElementById('copyNfcLinkBtn');
  const playlistContainer = document.getElementById('playlistContainer');
  const playlistCountSpan = document.getElementById('playlistCount');
  const addNetToPlaylistBtn = document.getElementById('addNetToPlaylistBtn');
  const clearPlaylistBtn = document.getElementById('clearPlaylistBtn');

  // ---------- 播放列表数据 ----------
  let playlist = [];          // { name, audioUrl, coverUrl }
  let currentSongIndex = -1;

  // ---------- 辅助函数 ----------
  function formatTime(seconds) {
    if (isNaN(seconds)) return "0:00";
    const mins = Math.floor(seconds / 60);
    const secs = Math.floor(seconds % 60);
    return `${mins}:${secs < 10 ? '0' + secs : secs}`;
  }

  function updateProgress() {
    if (audioElement.duration && !isNaN(audioElement.duration)) {
      progressSlider.value = (audioElement.currentTime / audioElement.duration) * 100;
      currentTimeSpan.innerText = formatTime(audioElement.currentTime);
    } else {
      currentTimeSpan.innerText = "0:00";
    }
  }

  function setDuration() {
    if (audioElement.duration && !isNaN(audioElement.duration)) {
      durationSpan.innerText = formatTime(audioElement.duration);
    } else {
      durationSpan.innerText = "0:00";
    }
  }

  function toggleSpin(playState) {
    if (playState) recordDisc.classList.add('spinning');
    else recordDisc.classList.remove('spinning');
  }

  function updatePlayPauseUI() {
    if (isPlaying) {
      playIcon.className = "fas fa-pause";
      toggleSpin(true);
    } else {
      playIcon.className = "fas fa-play";
      toggleSpin(false);
    }
  }

  function showToast(msg) {
    let toast = document.querySelector('.alert-toast');
    if (!toast) {
      toast = document.createElement('div');
      toast.className = 'alert-toast';
      document.body.appendChild(toast);
    }
    toast.innerText = msg;
    toast.style.opacity = '1';
    setTimeout(() => { toast.style.opacity = '0'; }, 2000);
  }

  // 加载音频 (autoPlay: 是否自动播放)
  function loadAudioFromUrl(url, autoPlay = false) {
    if (!url) return false;
    const wasPlaying = isPlaying;
    audioElement.pause();
    audioElement.src = url;
    audioElement.load();
    if (autoPlay || wasPlaying) {
      audioElement.play().catch(err => {
        console.warn("自动播放受限", err);
        showToast("点击播放按钮手动播放");
        isPlaying = false;
        updatePlayPauseUI();
      });
    } else {
      isPlaying = false;
      updatePlayPauseUI();
    }
    return true;
  }

  function setCoverImage(src) {
    if (src && src.trim() !== "") {
      coverImage.src = src;
    } else {
      coverImage.src = "https://placehold.co/400/2c2e3f/c9b982?text=🎵+COVER";
    }
  }

  // **** 核心：生成NFC链接（完整显示，不截断）****
  function updateNfcLink() {
    const currentAudioNet = audioUrlInput.value.trim();
    const currentCoverNet = coverUrlInput.value.trim();
    const baseUrl = window.location.href.split('?')[0].split('#')[0];
    const params = new URLSearchParams();
    let hasValid = false;
    if (currentAudioNet && (currentAudioNet.startsWith('http://') || currentAudioNet.startsWith('https://'))) {
      params.set('audio', encodeURIComponent(currentAudioNet));
      hasValid = true;
    }
    if (currentCoverNet && (currentCoverNet.startsWith('http://') || currentCoverNet.startsWith('https://'))) {
      params.set('cover', encodeURIComponent(currentCoverNet));
    }
    if (hasValid) {
      const fullUrl = baseUrl + '?' + params.toString();
      // 完整显示，不截断
      nfcLinkDisplay.innerText = fullUrl;
      nfcLinkDisplay.setAttribute('data-fullurl', fullUrl);
    } else {
      nfcLinkDisplay.innerText = "⚠️ 请在上方输入有效的网络音频地址 (https://) 以生成NFC链接";
      nfcLinkDisplay.setAttribute('data-fullurl', '');
    }
  }

  // 复制降级方案 (兼容所有浏览器)
  function fallbackCopyTextToClipboard(text) {
    const textarea = document.createElement('textarea');
    textarea.value = text;
    textarea.style.position = 'fixed';
    textarea.style.top = '-9999px';
    document.body.appendChild(textarea);
    textarea.select();
    let success = false;
    try {
      success = document.execCommand('copy');
    } catch (err) {
      console.error("fallback copy error", err);
    }
    document.body.removeChild(textarea);
    return success;
  }

  // 复制按钮事件 (现代 + 降级)
  function bindCopyEvent() {
    copyNfcLinkBtn.addEventListener('click', () => {
      const fullUrl = nfcLinkDisplay.getAttribute('data-fullurl');
      if (fullUrl && fullUrl !== '') {
        // 优先使用现代 Clipboard API
        if (navigator.clipboard && navigator.clipboard.writeText) {
          navigator.clipboard.writeText(fullUrl).then(() => {
            showToast("✅ NFC链接已复制！可粘贴到 NFC Tools 等应用");
          }).catch(err => {
            console.warn("Clipboard API failed, using fallback", err);
            if (fallbackCopyTextToClipboard(fullUrl)) {
              showToast("✅ 链接已复制（兼容模式）");
            } else {
              showToast("❌ 复制失败，请手动选中链接文本复制");
            }
          });
        } else {
          // 降级
          if (fallbackCopyTextToClipboard(fullUrl)) {
            showToast("✅ 链接已复制");
          } else {
            showToast("❌ 手动复制下方链接即可");
          }
        }
      } else {
        showToast("请先配置网络音频地址 (https://) 生成链接");
      }
    });
  }

  // 渲染播放列表UI
  function renderPlaylist() {
    if (playlist.length === 0) {
      playlistContainer.innerHTML = '<div style="text-align:center; color:#b9ae8c; padding:10px;">🎵 暂无歌曲，请上传本地音乐或添加网络地址</div>';
      playlistCountSpan.innerText = '0首';
      return;
    }
    playlistCountSpan.innerText = playlist.length + '首';
    let html = '';
    playlist.forEach((song, idx) => {
      const isActive = (idx === currentSongIndex);
      const activeClass = isActive ? 'active-song' : '';
      const typeLabel = song.audioUrl.startsWith('blob:') ? '本地' : (song.audioUrl.startsWith('http') ? '在线' : '其他');
      html += `
        <div class="playlist-item ${activeClass}" data-index="${idx}">
          <div class="song-info">
            <div class="song-name">${escapeHtml(song.name) || '未命名'}</div>
            <div class="song-meta">${typeLabel}</div>
          </div>
          <div class="playlist-actions">
            ${isActive ? '<span class="now-playing-tag"><i class="fas fa-play"></i> 播放中</span>' : ''}
            <button class="del-song-btn" data-delidx="${idx}"><i class="fas fa-trash-alt"></i></button>
          </div>
        </div>
      `;
    });
    playlistContainer.innerHTML = html;
    // 点击切换歌曲
    document.querySelectorAll('.playlist-item').forEach(item => {
      const idx = parseInt(item.dataset.index);
      if (!isNaN(idx)) {
        item.addEventListener('click', (e) => {
          if (e.target.closest('.del-song-btn')) return;
          switchToSong(idx);
        });
      }
    });
    // 删除按钮
    document.querySelectorAll('.del-song-btn').forEach(btn => {
      btn.addEventListener('click', (e) => {
        e.stopPropagation();
        const idx = parseInt(btn.dataset.delidx);
        if (!isNaN(idx)) removeSongFromPlaylist(idx);
      });
    });
  }

  function escapeHtml(str) {
    if (!str) return '';
    return str.replace(/[&<>]/g, function (m) {
      if (m === '&') return '&amp;';
      if (m === '<') return '&lt;';
      if (m === '>') return '&gt;';
      return m;
    });
  }

  // 切换歌曲核心
  function switchToSong(index) {
    if (index < 0 || index >= playlist.length) return;
    const song = playlist[index];
    if (!song.audioUrl) {
      showToast("音源无效");
      return;
    }
    currentSongIndex = index;
    loadAudioFromUrl(song.audioUrl, true);
    if (song.coverUrl) {
      setCoverImage(song.coverUrl);
      coverUrlInput.value = song.coverUrl;
    }
    if (song.audioUrl && (song.audioUrl.startsWith('http://') || song.audioUrl.startsWith('https://'))) {
      audioUrlInput.value = song.audioUrl;
    }
    updateNfcLink();
    renderPlaylist();
    showToast(`🎵 播放: ${song.name}`);
    audioElement.play().catch(e => console.log("自动播放需交互"));
  }

  // 添加歌曲
  function addSongToPlaylist(name, audioUrl, coverUrl = '') {
    if (!audioUrl) return false;
    playlist.push({
      name: name || (audioUrl.split('/').pop() || '未知歌曲'),
      audioUrl: audioUrl,
      coverUrl: coverUrl || ''
    });
    renderPlaylist();
    showToast(`✅ 已添加「${name}」到播放列表`);
    return true;
  }

  function removeSongFromPlaylist(index) {
    if (index < 0 || index >= playlist.length) return;
    const removed = playlist[index];
    playlist.splice(index, 1);
    if (playlist.length === 0) {
      currentSongIndex = -1;
      audioElement.pause();
      isPlaying = false;
      updatePlayPauseUI();
    } else {
      if (currentSongIndex === index) {
        if (index < playlist.length) currentSongIndex = index;
        else if (playlist.length > 0) currentSongIndex = playlist.length - 1;
        else currentSongIndex = -1;
        if (currentSongIndex !== -1) switchToSong(currentSongIndex);
        else {
          audioElement.pause();
          isPlaying = false;
          updatePlayPauseUI();
        }
      } else if (currentSongIndex > index) {
        currentSongIndex--;
      }
    }
    renderPlaylist();
    showToast(`🗑️ 已移除「${removed.name || '歌曲'}」`);
  }

  function clearPlaylist() {
    if (playlist.length === 0) return;
    playlist = [];
    currentSongIndex = -1;
    audioElement.pause();
    isPlaying = false;
    updatePlayPauseUI();
    renderPlaylist();
    showToast("播放列表已清空");
  }

  // 示例列表（网络音乐，可播放）
  function initExamplePlaylist() {
    playlist = [];
    const examples = [
      { name: "🎸 灵动序曲 (SoundHelix)", audioUrl: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3", coverUrl: "https://placehold.co/600/2d2f44/e2c28b?text=Rock" },
      { name: "🌿 钢琴叙事曲", audioUrl: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3", coverUrl: "https://placehold.co/600/2a2e40/d9bc7a?text=Piano" },
      { name: "🌙 电子氛围", audioUrl: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-3.mp3", coverUrl: "https://placehold.co/600/282c3e/cfb87c?text=Ambient" }
    ];
    examples.forEach(ex => playlist.push({ name: ex.name, audioUrl: ex.audioUrl, coverUrl: ex.coverUrl }));
    if (playlist.length) {
      currentSongIndex = 0;
      const first = playlist[0];
      loadAudioFromUrl(first.audioUrl, false);
      setCoverImage(first.coverUrl);
      audioUrlInput.value = first.audioUrl;
      coverUrlInput.value = first.coverUrl;
    }
    renderPlaylist();
    updateNfcLink();
    showToast("已加载示例播放列表");
  }

  // 本地上传（自动加入列表，blob链接仅供本地）
  function handleLocalAudioUpload(file) {
    if (!file || !file.type.startsWith('audio/')) {
      showToast("请选择音频文件");
      return;
    }
    const objectUrl = URL.createObjectURL(file);
    let fileName = file.name.replace(/\.[^/.]+$/, "");
    if (fileName.length > 40) fileName = fileName.substring(0, 37) + '...';
    addSongToPlaylist(fileName, objectUrl, coverUrlInput.value.trim());
    const newIdx = playlist.length - 1;
    switchToSong(newIdx);
    audioUrlInput.value = objectUrl;
    showToast("本地音乐已添加（注意：仅本机可播放，NFC请使用网络链接）");
  }

  // 从URL参数加载（支持NFC打开）
  function loadFromUrlParams() {
    const urlParams = new URLSearchParams(window.location.search);
    const audioParam = urlParams.get('audio');
    const coverParam = urlParams.get('cover');
    if (audioParam && (audioParam.startsWith('http://') || audioParam.startsWith('https://'))) {
      const decodedAudio = decodeURIComponent(audioParam);
      loadAudioFromUrl(decodedAudio, false);
      audioUrlInput.value = decodedAudio;
      addSongToPlaylist(decodedAudio.split('/').pop() || 'NFC歌曲', decodedAudio, coverParam ? decodeURIComponent(coverParam) : '');
    }
    if (coverParam && (coverParam.startsWith('http://') || coverParam.startsWith('https://'))) {
      setCoverImage(decodeURIComponent(coverParam));
      coverUrlInput.value = decodeURIComponent(coverParam);
    }
    updateNfcLink();
  }

  // ----- 事件绑定 -----
  audioElement.addEventListener('play', () => { isPlaying = true; updatePlayPauseUI(); });
  audioElement.addEventListener('pause', () => { isPlaying = false; updatePlayPauseUI(); });
  audioElement.addEventListener('timeupdate', updateProgress);
  audioElement.addEventListener('loadedmetadata', () => { setDuration(); progressSlider.value = 0; if (audioElement.currentTime === 0) currentTimeSpan.innerText = "0:00"; });
  audioElement.addEventListener('ended', () => { isPlaying = false; updatePlayPauseUI(); progressSlider.value = 0; currentTimeSpan.innerText = "0:00"; });
  audioElement.addEventListener('error', () => { showToast("音频加载失败"); isPlaying = false; updatePlayPauseUI(); });
  progressSlider.addEventListener('input', (e) => { if (audioElement.duration && !isNaN(audioElement.duration)) audioElement.currentTime = (e.target.value / 100) * audioElement.duration; updateProgress(); });
  volumeSlider.addEventListener('input', (e) => { audioElement.volume = e.target.value; });
  audioElement.volume = 0.7;
  playPauseBtn.addEventListener('click', () => { if (audioElement.src && audioElement.src !== '') { if (isPlaying) audioElement.pause(); else audioElement.play().catch(e => showToast("请检查音源")); } else showToast("请先从播放列表选择歌曲"); });

  audioUpload.addEventListener('change', (e) => { if (e.target.files[0]) handleLocalAudioUpload(e.target.files[0]); audioUpload.value = ''; });
  addNetToPlaylistBtn.addEventListener('click', () => {
    let url = audioUrlInput.value.trim();
    let cover = coverUrlInput.value.trim();
    if (!url) { showToast("请输入音频网络地址"); return; }
    let name = prompt("歌曲名称", url.split('/').pop() || "网络歌曲");
    if (name === null) name = "网络歌曲";
    addSongToPlaylist(name, url, cover);
  });
  clearPlaylistBtn.addEventListener('click', clearPlaylist);
  resetDefaultBtn.addEventListener('click', initExamplePlaylist);
  applyAudioBtn.addEventListener('click', () => { let url = audioUrlInput.value.trim(); if (url) loadAudioFromUrl(url, false); else showToast("请输入音频地址"); updateNfcLink(); });
  applyCoverBtn.addEventListener('click', () => { let url = coverUrlInput.value.trim(); if (url) setCoverImage(url); else showToast("请输入图片地址"); updateNfcLink(); });
  coverUpload.addEventListener('change', (e) => { if (e.target.files[0] && e.target.files[0].type.startsWith('image/')) { const objUrl = URL.createObjectURL(e.target.files[0]); setCoverImage(objUrl); coverUrlInput.value = objUrl; showToast("封面已更换"); } });
  audioUrlInput.addEventListener('input', updateNfcLink);
  coverUrlInput.addEventListener('input', updateNfcLink);

  // 初始化
  initExamplePlaylist();
  loadFromUrlParams();
  bindCopyEvent();     // 绑定复制（修复）
  toggleSpin(false);
  window.addEventListener('load', () => { setDuration(); updateNfcLink(); });
</script>
</body>
</html>
