<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>黑胶唱片 · 我只在乎你 & 稻香</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      user-select: none;
    }

    body {
      min-height: 100vh;
      background: radial-gradient(circle at 20% 30%, #1a1e2a, #0c0f17);
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: 'Segoe UI', 'Poppins', system-ui, -apple-system, 'Inter', sans-serif;
      padding: 1.5rem;
    }

    .player-container {
      max-width: 560px;
      width: 100%;
      background: rgba(20, 22, 36, 0.75);
      backdrop-filter: blur(16px);
      border-radius: 3rem;
      box-shadow: 0 25px 45px rgba(0, 0, 0, 0.5), inset 0 1px 0 rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.2);
      padding: 1.8rem 1.5rem 2rem;
    }

    .vinyl-section {
      display: flex;
      justify-content: center;
      margin-bottom: 1.5rem;
      position: relative;
    }

    .record-wrapper {
      position: relative;
      width: 220px;
      height: 220px;
      border-radius: 50%;
      background: #111;
      box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5), 0 0 0 6px rgba(255, 255, 255, 0.08), inset 0 1px 4px rgba(0, 0, 0, 0.6);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .record-wrapper::before {
      content: "";
      position: absolute;
      top: 8px;
      left: 8px;
      right: 8px;
      bottom: 8px;
      border-radius: 50%;
      background: repeating-radial-gradient(circle at 30% 30%, rgba(0, 0, 0, 0.2) 0px, rgba(0, 0, 0, 0.4) 2px, rgba(80, 70, 60, 0.1) 4px, rgba(0, 0, 0, 0.3) 6px);
      pointer-events: none;
      z-index: 2;
      mix-blend-mode: multiply;
    }

    .spinning {
      animation: spinRecord 8s linear infinite;
    }

    @keyframes spinRecord {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    .cover-frame {
      width: 160px;
      height: 160px;
      border-radius: 50%;
      overflow: hidden;
      background: #2a2a2a;
      box-shadow: inset 0 0 0 3px rgba(255, 215, 150, 0.5), 0 5px 12px black;
      z-index: 5;
    }

    .cover-frame img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .tonearm {
      position: absolute;
      top: -20px;
      right: -15px;
      width: 70px;
      height: 95px;
      background: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 120"><path fill="%23c0aa7a" d="M58,10 L70,25 L62,32 L50,18 Z" /><path fill="%23927b54" d="M68,25 L75,38 L68,44 L58,32 Z" /><circle cx="71" cy="45" r="6" fill="%234d3b1a"/><path fill="%23b39264" d="M72,48 L88,70 L82,76 L65,54 Z"/><circle cx="84" cy="74" r="4" fill="%236b4c2c"/></svg>') no-repeat center/contain;
      z-index: 10;
      filter: drop-shadow(2px 4px 6px rgba(0, 0, 0, 0.4));
      transform-origin: 20% 20%;
      transition: transform 0.35s cubic-bezier(0.2, 0.9, 0.4, 1.1);
    }

    .progress-area {
      margin: 20px 0 18px;
    }

    .time-info {
      display: flex;
      justify-content: space-between;
      font-size: 0.75rem;
      color: #ddd8ce;
      margin-bottom: 8px;
      font-weight: 500;
    }

    input[type="range"] {
      -webkit-appearance: none;
      width: 100%;
      background: transparent;
    }

    input[type="range"]::-webkit-slider-runnable-track {
      width: 100%;
      height: 5px;
      background: rgba(255, 255, 255, 0.2);
      border-radius: 10px;
    }

    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 16px;
      height: 16px;
      background: #f5c542;
      border-radius: 50%;
      margin-top: -5px;
      cursor: pointer;
      box-shadow: 0 0 6px #ffcf4a;
      border: 1px solid #ffe6b3;
    }

    .playback-buttons {
      display: flex;
      justify-content: center;
      gap: 2rem;
      margin: 20px 0 15px;
    }

    .ctrl-btn {
      background: rgba(20, 22, 40, 0.8);
      backdrop-filter: blur(4px);
      width: 56px;
      height: 56px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.8rem;
      color: #f0e6d2;
      cursor: pointer;
      transition: all 0.2s;
      box-shadow: 0 6px 12px rgba(0, 0, 0, 0.3);
      border: 1px solid rgba(255, 215, 150, 0.4);
    }

    .ctrl-btn:active {
      transform: scale(0.94);
    }

    .playlist-section {
      background: rgba(10, 12, 22, 0.6);
      border-radius: 2rem;
      padding: 1rem 1.2rem;
      margin-top: 1.2rem;
      backdrop-filter: blur(8px);
      border: 1px solid rgba(255, 215, 150, 0.25);
    }

    .section-title {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 2px;
      font-weight: 600;
      color: #cdc2a8;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .playlist-container {
      max-height: 220px;
      overflow-y: auto;
      padding-right: 5px;
    }

    .playlist-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: rgba(30, 32, 48, 0.7);
      margin-bottom: 8px;
      padding: 10px 12px;
      border-radius: 40px;
      cursor: pointer;
      transition: all 0.2s;
      border: 1px solid rgba(255, 215, 150, 0.2);
    }

    .playlist-item:hover {
      background: rgba(60, 63, 90, 0.9);
      border-color: #f5c542;
      transform: translateX(3px);
    }

    .playlist-item.active-song {
      background: linear-gradient(90deg, #2d2f42, #232536);
      border-left: 4px solid #f5c542;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
    }

    .song-info {
      flex: 1;
      overflow: hidden;
    }

    .song-name {
      font-size: 0.85rem;
      font-weight: 600;
      color: #f2e8d5;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .now-playing-tag {
      font-size: 0.6rem;
      background: #f5c54230;
      padding: 2px 8px;
      border-radius: 40px;
      color: #f5c542;
      margin-left: 8px;
      white-space: nowrap;
    }

    .nfc-section {
      margin-top: 15px;
      background: #00000040;
      border-radius: 1.5rem;
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .nfc-header {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.75rem;
      color: #f5c542;
    }

    .nfc-link-box {
      background: #12141f;
      padding: 10px 12px;
      border-radius: 20px;
      font-size: 0.7rem;
      font-family: monospace;
      word-break: break-all;
      color: #c7bc9a;
      border: 1px solid #2a2e4a;
      max-height: 80px;
      overflow-y: auto;
    }

    .copy-btn {
      background: #2a2e4a;
      border: none;
      color: #ffdfaa;
      padding: 8px 14px;
      border-radius: 40px;
      font-size: 0.75rem;
      cursor: pointer;
      width: 100%;
      transition: 0.2s;
    }

    .copy-btn:hover {
      background: #3d4070;
    }

    .volume-slider {
      width: 100%;
      margin-top: 10px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .volume-slider i {
      color: #decb9c;
    }

    .alert-toast {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: #f5c542dd;
      color: #1e1f2a;
      padding: 6px 18px;
      border-radius: 60px;
      font-size: 0.75rem;
      font-weight: bold;
      backdrop-filter: blur(12px);
      z-index: 999;
      transition: 0.2s;
      pointer-events: none;
    }

    @media (max-width: 480px) {
      .player-container { padding: 1.2rem; }
      .record-wrapper { width: 180px; height: 180px; }
      .cover-frame { width: 130px; height: 130px; }
      .ctrl-btn { width: 48px; height: 48px; font-size: 1.4rem; }
      .playlist-container { max-height: 180px; }
      .song-name { font-size: 0.75rem; }
    }
  </style>
</head>
<body>
<div class="player-container">
  <!-- 黑胶唱片区域 -->
  <div class="vinyl-section">
    <div class="record-wrapper" id="recordDisc">
      <div class="cover-frame">
        <img id="coverImage" src="https://cdn.jsdelivr.net/gh/nihao-create/my-music@main/%E5%B0%81%E9%9D%A2.jpg" alt="album cover">
      </div>
    </div>
    <div class="tonearm"></div>
  </div>

  <!-- 进度/音量 -->
  <div class="progress-area">
    <div class="time-info"><span id="currentTime">0:00</span><span id="durationTime">0:00</span></div>
    <input type="range" id="progressSlider" value="0" step="0.01">
    <div class="volume-slider">
      <i class="fas fa-volume-down"></i>
      <input type="range" id="volumeControl" min="0" max="1" step="0.01" value="0.7">
      <i class="fas fa-volume-up"></i>
    </div>
  </div>

  <!-- 播放按钮 -->
  <div class="playback-buttons">
    <div class="ctrl-btn" id="playPauseBtn"><i class="fas fa-play"></i></div>
  </div>

  <!-- 固定播放列表（两首歌曲） -->
  <div class="playlist-section">
    <div class="section-title">
      <span><i class="fas fa-list-ul"></i> 播放列表 · 点击切换</span>
      <span id="playlistCount" style="font-size:0.6rem;">2首</span>
    </div>
    <div class="playlist-container" id="playlistContainer">
      <!-- 动态渲染两首歌，无删除/编辑按钮 -->
    </div>
  </div>

  <!-- NFC 写入模块（基于当前播放的歌曲和封面自动生成链接） -->
  <div class="nfc-section">
    <div class="nfc-header"><i class="fas fa-microchip"></i> 🔗 NFC写入链接（基于当前网络音源）</div>
    <div class="nfc-link-box" id="nfcLinkDisplay">⚠️ 未检测到网络音频</div>
    <button class="copy-btn" id="copyNfcLinkBtn"><i class="far fa-copy"></i> 复制完整链接（用于NFC工具）</button>
  </div>
  <p style="font-size:0.55rem; text-align:center; margin-top:8px; color:#b9ae8c;">💡 触碰NFC即可打开本页并播放当前选中的歌曲</p>
</div>

<script>
  // 固定的两首歌曲（使用您的网络链接）
  const FIXED_SONGS = [
    { name: "🎵 我只在乎你（群像）", url: "https://cdn.jsdelivr.net/gh/nihao-create/my-music@main/%E6%88%91%E5%8F%AA%E5%9C%A8%E4%B9%8E%E4%BD%A0%EF%BC%88%E7%BE%A4%E5%83%8F%EF%BC%89.m4a", cover: "https://cdn.jsdelivr.net/gh/nihao-create/my-music@main/%E5%B0%81%E9%9D%A2.jpg" },
    { name: "🎵 稻香（群像）", url: "https://cdn.jsdelivr.net/gh/nihao-create/my-music@main/%E7%A8%BB%E9%A6%99%EF%BC%88%E7%BE%A4%E5%83%8F%EF%BC%89.m4a", cover: "https://cdn.jsdelivr.net/gh/nihao-create/my-music@main/%E5%B0%81%E9%9D%A2.jpg" }
  ];

  // DOM 元素
  const audioElement = new Audio();
  let isPlaying = false;
  let currentSongIndex = 0;   // 默认第一首

  const playPauseBtn = document.getElementById('playPauseBtn');
  const playIcon = playPauseBtn.querySelector('i');
  const progressSlider = document.getElementById('progressSlider');
  const currentTimeSpan = document.getElementById('currentTime');
  const durationSpan = document.getElementById('durationTime');
  const volumeSlider = document.getElementById('volumeControl');
  const coverImage = document.getElementById('coverImage');
  const recordDisc = document.getElementById('recordDisc');
  const playlistContainer = document.getElementById('playlistContainer');
  const nfcLinkDisplay = document.getElementById('nfcLinkDisplay');
  const copyNfcLinkBtn = document.getElementById('copyNfcLinkBtn');

  // 辅助函数
  function formatTime(seconds) {
    if (isNaN(seconds)) return "0:00";
    const mins = Math.floor(seconds / 60);
    const secs = Math.floor(seconds % 60);
    return `${mins}:${secs < 10 ? '0' + secs : secs}`;
  }

  function updateProgress() {
    if (audioElement.duration && !isNaN(audioElement.duration)) {
      progressSlider.value = (audioElement.currentTime / audioElement.duration) * 100;
      currentTimeSpan.innerText = formatTime(audioElement.currentTime);
    } else {
      currentTimeSpan.innerText = "0:00";
    }
  }

  function setDuration() {
    if (audioElement.duration && !isNaN(audioElement.duration)) {
      durationSpan.innerText = formatTime(audioElement.duration);
    } else {
      durationSpan.innerText = "0:00";
    }
  }

  function toggleSpin(playState) {
    if (playState) recordDisc.classList.add('spinning');
    else recordDisc.classList.remove('spinning');
  }

  function updatePlayPauseUI() {
    if (isPlaying) {
      playIcon.className = "fas fa-pause";
      toggleSpin(true);
    } else {
      playIcon.className = "fas fa-play";
      toggleSpin(false);
    }
  }

  function showToast(msg) {
    let toast = document.querySelector('.alert-toast');
    if (!toast) {
      toast = document.createElement('div');
      toast.className = 'alert-toast';
      document.body.appendChild(toast);
    }
    toast.innerText = msg;
    toast.style.opacity = '1';
    setTimeout(() => { toast.style.opacity = '0'; }, 2000);
  }

  // 加载歌曲（自动播放可选）
  function loadSongByIndex(index, autoPlay = false) {
    if (index < 0 || index >= FIXED_SONGS.length) return;
    const song = FIXED_SONGS[index];
    currentSongIndex = index;
    audioElement.pause();
    audioElement.src = song.url;
    audioElement.load();
    if (song.cover) coverImage.src = song.cover;
    if (autoPlay) {
      audioElement.play().catch(err => {
        console.warn("自动播放被阻止", err);
        showToast("点击播放按钮手动播放");
        isPlaying = false;
        updatePlayPauseUI();
      });
    } else {
      isPlaying = false;
      updatePlayPauseUI();
    }
    // 更新 NFC 链接（基于新歌曲）
    updateNfcLink();
    renderPlaylist();
  }

  // 播放/暂停逻辑
  function handlePlayPause() {
    if (!audioElement.src) {
      loadSongByIndex(0, true);
      return;
    }
    if (isPlaying) audioElement.pause();
    else audioElement.play().catch(e => showToast("请检查音源"));
  }

  // 生成 NFC 链接：基于当前页面地址 + 当前歌曲的音频和封面参数
  function updateNfcLink() {
    const currentSong = FIXED_SONGS[currentSongIndex];
    if (!currentSong) return;
    const audioUrl = currentSong.url;
    const coverUrl = currentSong.cover;
    const baseUrl = window.location.href.split('?')[0].split('#')[0];
    const params = new URLSearchParams();
    if (audioUrl && (audioUrl.startsWith('http://') || audioUrl.startsWith('https://'))) {
      params.set('audio', encodeURIComponent(audioUrl));
    }
    if (coverUrl && (coverUrl.startsWith('http://') || coverUrl.startsWith('https://'))) {
      params.set('cover', encodeURIComponent(coverUrl));
    }
    if (params.has('audio')) {
      const fullUrl = baseUrl + '?' + params.toString();
      nfcLinkDisplay.innerText = fullUrl;
      nfcLinkDisplay.setAttribute('data-fullurl', fullUrl);
    } else {
      nfcLinkDisplay.innerText = "⚠️ 当前歌曲无有效网络地址";
      nfcLinkDisplay.setAttribute('data-fullurl', '');
    }
  }

  // 复制降级方案
  function fallbackCopyTextToClipboard(text) {
    const textarea = document.createElement('textarea');
    textarea.value = text;
    textarea.style.position = 'fixed';
    textarea.style.top = '-9999px';
    document.body.appendChild(textarea);
    textarea.select();
    let success = false;
    try {
      success = document.execCommand('copy');
    } catch (err) {
      console.error(err);
    }
    document.body.removeChild(textarea);
    return success;
  }

  function bindCopyEvent() {
    copyNfcLinkBtn.addEventListener('click', () => {
      const fullUrl = nfcLinkDisplay.getAttribute('data-fullurl');
      if (fullUrl && fullUrl !== '') {
        if (navigator.clipboard && navigator.clipboard.writeText) {
          navigator.clipboard.writeText(fullUrl).then(() => {
            showToast("✅ NFC链接已复制！可写入NFC标签");
          }).catch(() => {
            if (fallbackCopyTextToClipboard(fullUrl)) showToast("✅ 链接已复制");
            else showToast("❌ 复制失败，请手动选择链接");
          });
        } else {
          if (fallbackCopyTextToClipboard(fullUrl)) showToast("✅ 链接已复制");
          else showToast("❌ 手动复制下方链接");
        }
      } else {
        showToast("请确保当前歌曲是网络音频");
      }
    });
  }

  // 渲染固定播放列表（无删除按钮，无清空功能）
  function renderPlaylist() {
    let html = '';
    FIXED_SONGS.forEach((song, idx) => {
      const isActive = (idx === currentSongIndex);
      const activeClass = isActive ? 'active-song' : '';
      html += `
        <div class="playlist-item ${activeClass}" data-index="${idx}">
          <div class="song-info">
            <div class="song-name">${escapeHtml(song.name)}</div>
          </div>
          ${isActive ? '<span class="now-playing-tag"><i class="fas fa-play"></i> 播放中</span>' : ''}
        </div>
      `;
    });
    playlistContainer.innerHTML = html;
    // 绑定点击切换事件
    document.querySelectorAll('.playlist-item').forEach(item => {
      const idx = parseInt(item.dataset.index);
      if (!isNaN(idx)) {
        item.addEventListener('click', () => {
          if (idx === currentSongIndex) return;
          loadSongByIndex(idx, true);
        });
      }
    });
  }

  function escapeHtml(str) {
    if (!str) return '';
    return str.replace(/[&<>]/g, function(m) {
      if (m === '&') return '&amp;';
      if (m === '<') return '&lt;';
      if (m === '>') return '&gt;';
      return m;
    });
  }

  // 从 URL 参数加载（支持 NFC 触碰打开）
  function loadFromUrlParams() {
    const urlParams = new URLSearchParams(window.location.search);
    const audioParam = urlParams.get('audio');
    const coverParam = urlParams.get('cover');
    if (audioParam) {
      const decodedAudio = decodeURIComponent(audioParam);
      // 查找匹配的歌曲索引
      const foundIndex = FIXED_SONGS.findIndex(s => s.url === decodedAudio);
      if (foundIndex !== -1) {
        loadSongByIndex(foundIndex, false);
      } else {
        // 外部传入的音频不在预设列表中，仍然尝试加载并临时使用（但不影响固定列表）
        audioElement.src = decodedAudio;
        audioElement.load();
        if (coverParam) coverImage.src = decodeURIComponent(coverParam);
        isPlaying = false;
        updatePlayPauseUI();
        // 注意：此时当前播放歌曲索引不变，但 NFC 链接仍基于固定列表的第一首？为了不混乱，保持固定列表高亮不变
      }
    } else {
      // 默认加载第一首
      loadSongByIndex(0, false);
    }
    updateNfcLink();
  }

  // 事件绑定
  audioElement.addEventListener('play', () => { isPlaying = true; updatePlayPauseUI(); });
  audioElement.addEventListener('pause', () => { isPlaying = false; updatePlayPauseUI(); });
  audioElement.addEventListener('timeupdate', updateProgress);
  audioElement.addEventListener('loadedmetadata', () => { setDuration(); progressSlider.value = 0; if (audioElement.currentTime === 0) currentTimeSpan.innerText = "0:00"; });
  audioElement.addEventListener('ended', () => { isPlaying = false; updatePlayPauseUI(); progressSlider.value = 0; currentTimeSpan.innerText = "0:00"; });
  audioElement.addEventListener('error', () => { showToast("音频加载失败"); isPlaying = false; updatePlayPauseUI(); });
  progressSlider.addEventListener('input', (e) => { if (audioElement.duration && !isNaN(audioElement.duration)) audioElement.currentTime = (e.target.value / 100) * audioElement.duration; updateProgress(); });
  volumeSlider.addEventListener('input', (e) => { audioElement.volume = e.target.value; });
  playPauseBtn.addEventListener('click', handlePlayPause);

  audioElement.volume = 0.7;
  bindCopyEvent();

  // 初始化
  renderPlaylist();
  loadFromUrlParams();
  toggleSpin(false);
  window.addEventListener('load', () => { setDuration(); updateNfcLink(); });
</script>
</body>
</html>
